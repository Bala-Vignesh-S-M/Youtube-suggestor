<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mood-Based Video Suggestor</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --positive: #10b981;
            --negative: #ef4444;
            --neutral: #3b82f6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            background-image: 
                radial-gradient(at 0% 0%, rgba(139, 92, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(to right, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        main {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .input-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
            animation: fadeInUp 0.8s ease-out;
        }

        .input-wrapper {
            display: flex;
            gap: 1rem;
        }

        input {
            flex: 1;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.2);
            color: white;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
        }

        button {
            padding: 1rem 2rem;
            border: none;
            border-radius: 12px;
            background: var(--primary);
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.4);
        }
        
        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .loader {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            display: none;
        }

        .status-message {
            margin-top: 1rem;
            font-size: 0.9rem;
            color: var(--primary);
            text-align: center;
            min-height: 1.2rem;
        }

        .results {
            display: none;
            flex-direction: column;
            gap: 2rem;
        }

        .meta-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.5rem;
            background: rgba(30, 41, 59, 0.7);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            animation: fadeInUp 0.5s ease-out;
        }

        .badge {
            padding: 0.4rem 1rem;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .badge.positive { background: rgba(16, 185, 129, 0.2); color: var(--positive); border: 1px solid var(--positive); }
        .badge.negative { background: rgba(239, 68, 68, 0.2); color: var(--negative); border: 1px solid var(--negative); }
        .badge.neutral { background: rgba(59, 130, 246, 0.2); color: var(--neutral); border: 1px solid var(--neutral); }

        .query-text {
            color: var(--text-muted);
            font-style: italic;
        }

        .videos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .video-card {
            background: var(--surface);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.05);
            opacity: 0;
            transform: translateY(20px);
        }

        .video-card.show {
            animation: fadeInUp 0.6s ease-out forwards;
        }

        .video-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .iframe-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
        }

        .iframe-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .video-title {
            padding: 1.2rem;
            font-size: 1rem;
            font-weight: 600;
            line-height: 1.4;
            color: var(--text-main);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .input-wrapper { flex-direction: column; }
            h1 { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Mood-Based Suggestor</h1>
        <p class="subtitle">Tell me how you feel. I'll find the perfect videos.</p>
    </header>

    <main>
        <div class="input-card">
            <div class="input-wrapper">
                <input type="text" id="moodInput" placeholder="E.g., I feel bored and tired..." autocomplete="off">
                <button id="suggestBtn">
                    <span id="btnText">Suggest</span>
                    <div class="loader" id="loader"></div>
                </button>
            </div>
            <div class="status-message" id="statusMessage"></div>
        </div>

        <div class="results" id="resultsArea">
            <div class="meta-info">
                <div>
                    <span style="color: var(--text-muted); margin-right: 0.5rem;">Detected Mood:</span>
                    <span id="moodBadge" class="badge"></span>
                </div>
                <div class="query-text">
                    Searching for: <span id="querySpan" style="color: white; font-weight: 600;"></span>
                </div>
            </div>

            <div class="videos-grid" id="videosGrid">
                <!-- Videos will be injected here -->
            </div>
        </div>
    </main>

    <script>
        const input = document.getElementById('moodInput');
        const btn = document.getElementById('suggestBtn');
        const btnText = document.getElementById('btnText');
        const loader = document.getElementById('loader');
        const statusMsg = document.getElementById('statusMessage');
        const resultsArea = document.getElementById('resultsArea');
        const videosGrid = document.getElementById('videosGrid');
        const moodBadge = document.getElementById('moodBadge');
        const querySpan = document.getElementById('querySpan');

        // Allow entering via Enter key
        input.addEventListener('keyup', (e) => {
            if (e.key === 'Enter') handleSuggest();
        });

        btn.addEventListener('click', handleSuggest);

        async function handleSuggest() {
            const text = input.value.trim();
            if (!text) return;

            // UI Loading state
            btn.disabled = true;
            btnText.style.display = 'none';
            loader.style.display = 'block';
            statusMsg.textContent = 'Analyzing sentiment (may take a moment to load model)...';
            statusMsg.style.color = 'var(--primary)';
            resultsArea.style.display = 'none';
            videosGrid.innerHTML = '';

            try {
                // Call FastAPI backend
                const response = await fetch('/recommend', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || 'Failed to process request');
                }

                // Render Results
                statusMsg.textContent = '';
                resultsArea.style.display = 'flex';
                
                // Set Badge
                moodBadge.textContent = data.mood;
                moodBadge.className = `badge ${data.mood}`;
                
                // Set Query
                querySpan.textContent = `"${data.query}"`;

                // Render Videos
                if (data.videos.length === 0) {
                    videosGrid.innerHTML = '<p style="color: var(--text-muted)">No videos found.</p>';
                } else {
                    data.videos.forEach((video, index) => {
                        const card = document.createElement('div');
                        card.className = 'video-card';
                        card.style.animationDelay = `${index * 0.15}s`;
                        
                        card.innerHTML = `
                            <div class="iframe-container">
                                <iframe src="${video.embed_url}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                            </div>
                            <div class="video-title">${video.title}</div>
                        `;
                        
                        videosGrid.appendChild(card);
                        
                        // Trigger animation
                        setTimeout(() => card.classList.add('show'), 50);
                    });
                }

            } catch (error) {
                console.error(error);
                statusMsg.textContent = `Error: ${error.message}`;
                statusMsg.style.color = 'var(--negative)';
            } finally {
                // Revert UI Loading state
                btn.disabled = false;
                btnText.style.display = 'block';
                loader.style.display = 'none';
            }
        }
    </script>
</body>
</html>
